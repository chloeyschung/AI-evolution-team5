name: Python CI

on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-ci.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/
        continue-on-error: true

      - name: Format check (black)
        run: uv run black --check src/ tests/
        continue-on-error: true

      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-at-least-32-characters-long"
          ENCRYPTION_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
          GOOGLE_CLIENT_ID: "test-client-id.apps.googleusercontent.com"
          GOOGLE_CLIENT_SECRET: "test-client-secret"
          GOOGLE_REDIRECT_URI: "http://localhost:3001/oauth-callback"
          EMAIL_LOOKUP_KEY: "ci-test-email-lookup-key-at-least-32-chars"
          SMTP_HOST: "localhost"
