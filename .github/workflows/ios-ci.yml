name: iOS CI

on:
  push:
    branches: [prototype-1]
  pull_request:
    branches: [prototype-1]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Briefly
        run: |
          mkdir -p BrieflyTests
          xcodegen generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: Briefly/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Briefly/Briefly.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        working-directory: Briefly
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build (no code signing)
        working-directory: Briefly
        run: |
          xcodebuild build \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO
