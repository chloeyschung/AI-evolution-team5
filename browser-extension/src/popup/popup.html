<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefly</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="loading" class="state hidden" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p>Checking your Briefly session…</p>
    </div>

    <section id="logged-out" class="state hidden" aria-label="Logged out">
      <p class="eyebrow">Briefly Extension</p>
      <h1>Save now. Learn now.</h1>
      <p class="subtitle">No backlog guilt. Capture any page and return to a clean, bite-sized queue.</p>
      <button id="login-btn" class="btn primary">Continue with Google</button>
    </section>

    <section id="logged-in" class="state hidden" aria-label="Logged in">
      <header class="panel-head">
        <div>
          <p class="eyebrow">Ready to capture</p>
          <h2>Briefly</h2>
        </div>
        <span id="user-email" class="user-pill">user@example.com</span>
      </header>

      <button id="save-current-page" class="btn primary block">Save current page</button>

      <div class="settings" aria-label="Capture settings">
        <label class="setting-item checkbox-row">
          <input type="checkbox" id="auto-summarize" checked>
          <span>Auto-create a 3-line summary</span>
        </label>

        <label class="setting-item" for="api-url">API base URL</label>
        <input type="url" id="api-url" inputmode="url" autocomplete="url">
      </div>

      <button id="logout-btn" class="btn ghost block">Logout</button>
    </section>

    <section id="error" class="state hidden" aria-live="polite">
      <p class="error-message" id="error-message">Something went wrong.</p>
      <button id="retry-btn" class="btn ghost block">Retry</button>
    </section>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
