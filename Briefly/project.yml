name: Briefly
options:
  bundleIdPrefix: com.briefly
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:

  # ── 메인 앱 타겟 ──────────────────────────────────────────────────
  Briefly:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    dependencies:
      - target: BrieflyShareExtension
        embed: true
      - package: SwiftSoup
      - package: GoogleSignIn
        product: GoogleSignIn
    sources:
      - path: Briefly
        excludes:
          - "**/*.entitlements"
    info:
      path: Briefly/Info.plist
      properties:
        CFBundleDisplayName: Briefly
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
        GIDClientID: "742261948942-9s5t6mftmpp5bpi9slul3dd2ubbr049m.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - briefly
            CFBundleURLName: com.briefly-ai.app
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.742261948942-9s5t6mftmpp5bpi9slul3dd2ubbr049m
            CFBundleURLName: com.googleusercontent.apps.742261948942-9s5t6mftmpp5bpi9slul3dd2ubbr049m
    entitlements:
      path: Briefly/Briefly.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.briefly.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briefly-ai.app
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        INFOPLIST_FILE: Briefly/Info.plist

  # ── Share Extension 타겟 ─────────────────────────────────────────
  BrieflyShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BrieflyShareExtension
        excludes:
          - "**/*.entitlements"
      # 메인 앱과 공유하는 파일들 (양쪽 타겟 멤버십)
      - path: Briefly/Models/SavedItem.swift
      - path: Briefly/Services/StorageService.swift
      - path: Briefly/Services/AuthTokenStore.swift
      - path: Briefly/Services/BrieflyAPI.swift
    info:
      path: BrieflyShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save Document to Briefly
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO 'public.url').@count > 0).@count > 0"
          NSExtensionPointIdentifier: com.apple.ui-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: BrieflyShareExtension/BrieflyShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.briefly.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briefly-ai.app.shareextension
        INFOPLIST_FILE: BrieflyShareExtension/Info.plist

  # ── 테스트 타겟 ───────────────────────────────────────────────────
  BrieflyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrieflyTests
    dependencies:
      - target: Briefly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briefly-ai.app.tests

schemes:
  Briefly:
    build:
      targets:
        Briefly: all
        BrieflyShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrieflyTests
